<div class="cadastro-form">
  <div class="cadastro-form__container">
    <div class="cadastro-form__card">
      <h2 class="cadastro-form__title">{{ formConfig.title }}</h2>

      <p class="cadastro-form__description">
        {{ formConfig.description }}
      </p>

      <form [formGroup]="dadosPessoaisForm" (ngSubmit)="onProximo()">

        <ng-container *ngFor="let field of formConfig.fields">

          <ng-container *ngIf="isFieldType(field, 'text') || isFieldType(field, 'email') || isFieldType(field, 'password')">
            <div class="cadastro-form__field" [ngClass]="{'cadastro-form__field--half': field.width === 'half'}">
              <label [for]="field.formControlName" class="cadastro-form__label">{{ field.label }}</label>
              <input
                [id]="field.formControlName"
                [type]="field.type"
                class="cadastro-form__input"
                [formControlName]="field.formControlName"
                [placeholder]="field.placeholder || ''">

              <div *ngIf="dadosPessoaisForm.get(field.formControlName)?.invalid && dadosPessoaisForm.get(field.formControlName)?.touched" class="cadastro-form__error">
                <ng-container *ngFor="let error of field.errorMessages | keyvalue">
                  <span *ngIf="dadosPessoaisForm.get(field.formControlName)?.errors?.[error.key]">{{ error.value }}</span>
                </ng-container>
              </div>
            </div>
          </ng-container>

          <ng-container *ngIf="isFieldType(field, 'select')">
            <div class="cadastro-form__field" [ngClass]="{'cadastro-form__field--half': field.width === 'half'}">
              <label [for]="field.formControlName" class="cadastro-form__label">{{ field.label }}</label>

              <select
                *ngIf="field.formControlName === 'estado'"
                [id]="field.formControlName"
                class="cadastro-form__select"
                [formControlName]="field.formControlName">
                <option value="" disabled selected>{{ field.placeholder || 'Selecione' }}</option>
                <ng-container *ngIf="estados$ | async as estados">
                  <option *ngFor="let estado of estados" [value]="estado.sigla">{{ estado.nome }}</option>
                </ng-container>
              </select>

              <select
                *ngIf="field.formControlName === 'cidade'"
                [id]="field.formControlName"
                class="cadastro-form__select"
                [formControlName]="field.formControlName"
                [disabled]="(carregandoCidades$ | async) || !dadosPessoaisForm.get('estado')?.value">
                <option value="" disabled selected>{{ (carregandoCidades$ | async) ? 'Carregando...' : (field.placeholder || 'Selecione') }}</option>
                <ng-container *ngIf="cidades$ | async as cidades">
                  <option *ngFor="let cidade of cidades" [value]="cidade.nome">{{ cidade.nome }}</option>
                </ng-container>
              </select>

              <div *ngIf="dadosPessoaisForm.get(field.formControlName)?.invalid && dadosPessoaisForm.get(field.formControlName)?.touched" class="cadastro-form__error">
                <ng-container *ngFor="let error of field.errorMessages | keyvalue">
                  <span *ngIf="dadosPessoaisForm.get(field.formControlName)?.errors?.[error.key]">{{ error.value }}</span>
                </ng-container>
              </div>
            </div>
          </ng-container>
        </ng-container>

        <div *ngIf="dadosPessoaisForm.errors?.['senhasNaoIguais'] && dadosPessoaisForm.get('confirmaSenha')?.touched" class="cadastro-form__error">
          As senhas não coincidem
        </div>

        <div class="cadastro-form__actions">
          <app-button
            text="Anterior"
            type="outline"
            icon="fas fa-arrow-left"
            iconPosition="left"
            (clicked)="onAnterior()">
          </app-button>

          <app-button
            text="Próximo"
            type="primary"
            icon="fas fa-arrow-right"
            iconPosition="right"
            [disabled]="dadosPessoaisForm.invalid"
            (clicked)="onProximo()">
          </app-button>
        </div>
      </form>
    </div>
  </div>
</div>
